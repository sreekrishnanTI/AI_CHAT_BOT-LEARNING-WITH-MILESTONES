<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shop Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="w-full max-w-3xl bg-white shadow-xl rounded-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-indigo-600 text-white p-5">
        <h1 class="text-2xl font-bold">
            🤖 AI Shop Assistant
        </h1>
        <p class="text-sm text-indigo-100">
            Ask anything about products
        </p>
    </div>

    <!-- Chat Area -->
    <div class="h-[500px] overflow-y-auto p-6 space-y-6 bg-gray-50">

        {% if user_message %}
        <div class="flex justify-end">
            <div class="bg-indigo-600 text-white rounded-2xl px-4 py-3 max-w-md shadow">
                <p class="text-xs opacity-80 mb-1">You</p>
                <p>{{ user_message }}</p>
            </div>
        </div>
        {% endif %}

        {% if reply %}
        <div class="flex justify-start">
            <div class="bg-white border rounded-2xl px-4 py-3 max-w-md shadow">
                <p class="text-xs text-gray-500 mb-1">
                    🤖 AI Assistant
                </p>
                <p class="text-gray-800 whitespace-pre-wrap">
                    {{ reply }}
                </p>
            </div>
        </div>
        {% endif %}

    </div>

    <!-- Input -->
    <form method="POST" class="border-t p-4 flex gap-3">
        {% csrf_token %}

        <input
            type="text"
            name="message"
            value="{{ user_message }}"
            placeholder="Ask about laptops, phones, watches..."
            class="flex-1 border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <button
            type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 rounded-xl transition"
        >
            Send
        </button>
    </form>

</div>

</body>
</html>
